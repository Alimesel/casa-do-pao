<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="donutGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#E8B14F;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#D4956F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6140;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="holeGradient" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5DEB3;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="150" cy="240" rx="80" ry="20" fill="rgba(0,0,0,0.15)"/>
  
  <!-- Main Donut -->
  <circle cx="150" cy="150" r="100" fill="url(#donutGradient)" filter="url(#shadow)"/>
  
  <!-- Donut Hole -->
  <circle cx="150" cy="150" r="55" fill="url(#holeGradient)"/>
  
  <!-- Glaze Shine -->
  <ellipse cx="150" cy="120" rx="90" ry="70" fill="rgba(255,255,255,0.25)" opacity="0.6"/>
  
  <!-- Sprinkles -->
  <g id="sprinkles">
    <!-- Pink sprinkles top left -->
    <rect x="80" y="50" width="4" height="20" fill="#FF69B4" rx="2" transform="rotate(-25 82 60)"/>
    <rect x="95" y="45" width="4" height="22" fill="#FF1493" rx="2" transform="rotate(-15 97 56)"/>
    
    <!-- Yellow sprinkles top -->
    <rect x="140" y="35" width="4" height="20" fill="#FFD700" rx="2" transform="rotate(0 142 45)"/>
    <rect x="160" y="38" width="4" height="22" fill="#FFA500" rx="2" transform="rotate(15 162 49)"/>
    
    <!-- Red sprinkles top right -->
    <rect x="200" y="50" width="4" height="20" fill="#FF6347" rx="2" transform="rotate(25 202 60)"/>
    <rect x="220" y="65" width="4" height="20" fill="#DC143C" rx="2" transform="rotate(35 222 75)"/>
    
    <!-- Green sprinkles right side -->
    <rect x="235" y="120" width="4" height="18" fill="#32CD32" rx="2" transform="rotate(50 237 129)"/>
    <rect x="240" y="150" width="4" height="20" fill="#00AA66" rx="2" transform="rotate(90 242 160)"/>
    
    <!-- Purple sprinkles bottom right -->
    <rect x="220" y="210" width="4" height="18" fill="#9370DB" rx="2" transform="rotate(140 222 219)"/>
    <rect x="195" y="235" width="4" height="20" fill="#8B008B" rx="2" transform="rotate(160 197 245)"/>
  </g>
  
  <!-- Chocolate drips (optional) -->
  <path d="M 100 200 Q 95 220 100 240" stroke="#6B4423" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 200 200 Q 205 220 200 240" stroke="#6B4423" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Highlight -->
  <ellipse cx="130" cy="110" rx="20" ry="30" fill="rgba(255,255,255,0.4)" opacity="0.5"/>
</svg>
