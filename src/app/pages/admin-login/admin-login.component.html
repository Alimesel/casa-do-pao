<div class="lp">

  <!-- LEFT BRAND PANEL -->
  <div class="lp-brand">
    <div class="lp-brand-inner">

      <div class="lp-brand-top">
        <div class="lp-logo-wrap">
          <img src="assets/images/logo.png" alt="Casa do Pão" class="lp-logo">
        </div>
        <h1 class="lp-brand-name">Casa do Pão</h1>
        <p class="lp-brand-tagline">Handcrafted since 2010 · Lisboa</p>
      </div>

      <div class="lp-brand-deco">
        <div class="lp-deco-circle lp-deco-circle--1"></div>
        <div class="lp-deco-circle lp-deco-circle--2"></div>
        <div class="lp-deco-line"></div>
      </div>

      <div class="lp-brand-quote">
        <p>"Every morning begins<br>with something beautiful."</p>
      </div>

    </div>
  </div>

  <!-- RIGHT FORM PANEL -->
  <div class="lp-form-panel">
    <div class="lp-form-inner">

      <!-- Mobile logo (hidden on desktop) -->
      <div class="lp-mobile-brand">
        <img src="assets/images/logo.png" alt="Casa do Pão">
        <span>Casa do Pão</span>
      </div>

      <div class="lp-form-header">
        <p class="lp-form-eyebrow">Admin Portal</p>
        <h2 class="lp-form-title">Sign in</h2>
        <p class="lp-form-sub">Enter your credentials to continue</p>
      </div>

      <form class="lp-form" (ngSubmit)="login()">

        @if (error()) {
          <div class="lp-error" role="alert">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span>{{ error() }}</span>
          </div>
        }

        <div class="lp-field">
          <label class="lp-label" for="lp-username">Username</label>
          <div class="lp-input-shell">
            <svg class="lp-input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              id="lp-username"
              class="lp-input"
              type="text"
              [(ngModel)]="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required>
          </div>
        </div>

        <div class="lp-field">
          <label class="lp-label" for="lp-password">Password</label>
          <div class="lp-input-shell">
            <svg class="lp-input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input
              id="lp-password"
              class="lp-input"
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required>
          </div>
        </div>

        <button class="lp-submit" type="submit" [disabled]="loading()">
          @if (loading()) {
            <span class="lp-spin"></span>
            Signing in…
          } @else {
            Sign In
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          }
        </button>

      </form>

      <p class="lp-footer-note">Secure admin access · Casa do Pão</p>

    </div>
  </div>

</div>
