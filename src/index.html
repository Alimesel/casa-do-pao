<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Casa do Pão — Artisan Sweet Shop</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!--
    ╔══════════════════════════════════════════════════════╗
    ║  CRITICAL PERFORMANCE FIX: Preload hero images       ║
    ║  These load BEFORE Angular boots, so images appear   ║
    ║  instantly the moment the page renders.              ║
    ╚══════════════════════════════════════════════════════╝
  -->
  <link rel="preload" as="image" href="assets/images/donut.png" fetchpriority="high">
  <link rel="preload" as="image" href="assets/images/strawberry.png" fetchpriority="high">
  <link rel="preload" as="image" href="assets/images/oneberry1.webp" fetchpriority="high" type="image/webp">

  <!--
    DNS prefetch for Supabase so the DB connection starts earlier.
    Replace YOUR_PROJECT_ID with your actual Supabase project subdomain.
  -->
  <link rel="preconnect" href="https://YOUR_PROJECT_ID.supabase.co">
  <link rel="dns-prefetch" href="https://YOUR_PROJECT_ID.supabase.co">

</head>
<body>
  <app-root></app-root>
</body>
</html>
